{% extends 'base.html' %}
{% load static %}

{% block title %}Тест: {{ lesson.title }}{% endblock %}

{% block extra_head %}
<style>
.test-fullscreen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #f5f7fa 0%, #e9f0e6 100%);
    z-index: 1050;
    overflow-y: auto;
    font-family: 'Inter', sans-serif;
}
.quiz-card {
    max-width: 700px;
    margin: 40px auto;
    background: white;
    border-radius: 48px;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
    padding: 32px 40px 48px;
}
.lives-indicator {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 20px;
}
.heart {
    font-size: 32px;
    color: #ff4b4b;
}
.heart-lost {
    color: #d1d5db;
    filter: grayscale(1);
}
.timer-bar {
    height: 8px;
    background: #e5e7eb;
    border-radius: 4px;
    margin: 20px 0;
    overflow: hidden;
}
.timer-progress {
    height: 100%;
    width: 100%;
    background: #10b981;
    transition: width 0.1s linear;
}
.timer-progress.warning { background: #f59e0b; }
.timer-progress.danger { background: #ef4444; }
#question-text {
    font-size: 1.8rem;
    font-weight: 700;
    color: #1f2937;
    text-align: center;
    margin: 20px 0 32px;
}
.option-btn {
    background: #f9fafb;
    border: 2px solid #e5e7eb;
    border-radius: 20px;
    padding: 16px 20px;
    font-size: 1.05rem;
    cursor: pointer;
    margin-bottom: 12px;
    transition: all 0.2s;
}
.option-btn:hover {
    background: #f3f4f6;
    border-color: #cbd5e1;
}
.option-letter {
    font-weight: 800;
    background: #e2e8f0;
    width: 36px;
    height: 36px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    margin-right: 12px;
}
.correct-glow {
    animation: correctPulse 0.4s;
}
@keyframes correctPulse {
    0% { background-color: #dcfce7; transform: scale(1); }
    50% { background-color: #86efac; transform: scale(1.02); }
    100% { background-color: #dcfce7; transform: scale(1); }
}
.wrong-shake {
    animation: shake 0.3s ease-in-out;
    background-color: #fee2e2 !important;
}
@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
    100% { transform: translateX(0); }
}
.character-sidebar {
    position: fixed;
    left: 24px;
    bottom: 24px;
    width: 100px;
    height: 100px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: 2px solid #fbbf24;
    z-index: 1060;
}
.character-img {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    object-fit: cover;
}
.character-speech {
    position: absolute;
    bottom: 110px;
    left: 110px;
    background: white;
    border-radius: 28px;
    padding: 10px 20px;
    display: none;
    white-space: nowrap;
}
.character-sidebar:hover .character-speech {
    display: block;
}
@media (max-width: 640px) {
    .quiz-card { padding: 20px; margin: 20px; }
    #question-text { font-size: 1.4rem; }
    .character-sidebar { width: 70px; height: 70px; left: 12px; bottom: 12px; }
    .character-img { width: 62px; height: 62px; }
    .character-speech { left: 80px; bottom: 80px; font-size: 0.75rem; white-space: normal; }
}
</style>
{% endblock %}

{% block content %}
<div class="test-fullscreen">
    <div class="character-sidebar">
        <img src="{% static 'img/tatar_character.png' %}" class="character-img" alt="Персонаж" onerror="this.src='https://via.placeholder.com/100?text=Шүрәле'">
        <div class="character-speech">Татарча өйрәнәбез! 😊</div>
    </div>
    <div class="quiz-card">
        <div class="lives-indicator" id="lives-container"></div>
        <div class="timer-bar"><div class="timer-progress" id="timer-progress"></div></div>
        <div class="d-flex justify-content-between mb-3">
            <span class="badge bg-secondary" id="question-counter">1 / {{ questions.count }}</span>
            <span class="badge bg-info" id="timer-text">30</span>
        </div>
        <h2 id="question-text"></h2>
        <div id="options-container" class="mt-4"></div>
    </div>
</div>

<script>
window.lessonId = {{ lesson.id }};
window.csrfToken = '{{ csrf_token }}';
const questionsJson = [
{% for question in questions %}
{
    id: {{ question.id }},
    text: "{{ question.text|escapejs }}",
    question_type: "{{ question.question_type }}",
    options: [{% for num, opt in question.get_options %}"{{ opt|escapejs }}"{% if not forloop.last %},{% endif %}{% endfor %}],
    correct_option: {{ question.correct_option }},
    explanation: "{{ question.explanation|escapejs }}",
    time_limit: 30
}{% if not forloop.last %},{% endif %}
{% endfor %}
];
</script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
<script>
let currentQuestionIndex = 0;
let userLives = 5;
let timerInterval = null;
let canAnswer = true;

function updateLivesDisplay() {
    const container = document.getElementById('lives-container');
    if (!container) return;
    container.innerHTML = '';
    for (let i = 0; i < 5; i++) {
        const heart = document.createElement('i');
        heart.className = i < userLives ? 'fas fa-heart heart' : 'fas fa-heart heart heart-lost';
        container.appendChild(heart);
    }
    if (userLives <= 0) {
        canAnswer = false;
        if (timerInterval) clearInterval(timerInterval);
        alert('Жизни закончились! Урок не засчитан.');
        window.location.href = window.location.href.replace('/test/', '/');
    }
}

function loadQuestion(index) {
    if (!canAnswer) return;
    if (index >= questionsJson.length) {
        launchConfetti();
        setTimeout(() => { window.location.href = '/course/{{ lesson.course.slug }}/'; }, 2000);
        return;
    }
    const q = questionsJson[index];
    document.getElementById('question-text').innerText = q.text;
    document.getElementById('question-counter').innerText = (index+1) + ' / ' + questionsJson.length;
    const container = document.getElementById('options-container');
    container.innerHTML = '';
    q.options.forEach((opt, idx) => {
        const btn = document.createElement('div');
        btn.className = 'option-btn';
        btn.innerHTML = `<span class="option-letter">${String.fromCharCode(65+idx)}</span> ${opt}`;
        btn.onclick = () => {
            if (!canAnswer) return;
            const isCorrect = (idx+1 === q.correct_option);
            if (isCorrect) {
                btn.classList.add('correct-glow');
                setTimeout(() => { loadQuestion(index+1); }, 500);
            } else {
                btn.classList.add('wrong-shake');
                setTimeout(() => btn.classList.remove('wrong-shake'), 300);
                userLives--;
                updateLivesDisplay();
                if (userLives > 0) {
                    setTimeout(() => loadQuestion(index), 800);
                }
            }
        };
        container.appendChild(btn);
    });
    startTimer(30);
}

function startTimer(seconds) {
    if (timerInterval) clearInterval(timerInterval);
    let timeLeft = seconds;
    const timerBar = document.getElementById('timer-progress');
    const timerText = document.getElementById('timer-text');
    timerInterval = setInterval(() => {
        if (!canAnswer) return;
        timeLeft--;
        timerText.innerText = timeLeft;
        const percent = (timeLeft / seconds) * 100;
        timerBar.style.width = percent + '%';
        if (percent < 30) timerBar.classList.add('danger');
        else if (percent < 60) timerBar.classList.add('warning');
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            userLives--;
            updateLivesDisplay();
            if (userLives > 0) loadQuestion(currentQuestionIndex);
        }
    }, 1000);
}

function launchConfetti() {
    if (typeof confetti === 'function') confetti({ particleCount: 200, spread: 80 });
}

updateLivesDisplay();
loadQuestion(0);
</script>
{% endblock %}
